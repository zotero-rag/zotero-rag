name: Coverage
permissions:
  contents: read

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches: ["master"]
    paths-ignore:
      - '**/*.md'

jobs:
  coverage:
    if: github.event.pull_request.draft == false
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 15
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Dependencies
        run: sudo apt-get update && sudo apt-get install protobuf-compiler

      - uses: rui314/setup-mold@v1

      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
              ~/.cargo/bin/
              ~/.cargo/registry/index/
              ~/.cargo/registry/cache/
              ~/.cargo/git/db/
              target/
          key: ${{ runner.os }}-cargo-llvm-cov-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust
        run: rustup update stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate code coverage
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info
          cargo llvm-cov report --workspace --summary-only
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
          VOYAGE_AI_API_KEY: ${{ secrets.VOYAGE_AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENROUTER_MODEL: google/gemini-2.5-flash
          ZEROENTROPY_API_KEY: ${{ secrets.ZEROENTROPY_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          VOYAGE_AI_MODEL: voyage-4-lite
          OPENAI_MODEL: gpt-5.4-mini
          OPENAI_EMBEDDING_MODEL: text-embedding-3-small
          MAX_CONCURRENT_REQUESTS: 5

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
          fail-on-error: true
